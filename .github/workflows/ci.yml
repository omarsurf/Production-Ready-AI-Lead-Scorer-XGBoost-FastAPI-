name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run linting
        run: |
          ruff check src app tests

      - name: Check formatting
        run: |
          ruff format --check src app tests

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-lead-scoring:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t ai-lead-scoring:test .
          docker run --rm -d --name test-api -p 8000:8000 ai-lead-scoring:test
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

  evaluate:
    name: Model Evaluation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model evaluation
        run: |
          python -m src.evaluate \
            --input data/raw/bank+marketing/bank/bank-full.csv \
            --output outputs/evaluation_report.json

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: outputs/evaluation_report.json
          retention-days: 30

      - name: Check model performance
        run: |
          python -c "
          import json
          with open('outputs/evaluation_report.json') as f:
              report = json.load(f)
          roc_auc = report['roc_auc']
          print(f'ROC-AUC: {roc_auc}')
          if roc_auc < 0.75:
              print('WARNING: ROC-AUC below threshold (0.75)')
              exit(1)
          print('Model performance OK')
          "
